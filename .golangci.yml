version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/julien-jungo/vigil
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: indent-error-flow

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
