# required
url: https://myapp.example.com

# optional (default: ./specs)
specs: ./specs

llm:
  provider: anthropic            # required
  model: claude-sonnet-4-6       # required
  api_key: ${ANTHROPIC_API_KEY}  # required

# optional
playwright:
  headless: true
  viewport:
    width: 1280
    height: 720

# optional
reports:
  junit: ./reports/junit.xml
  html: ./reports/report.html

# optional
explore:
  max_steps: 100
